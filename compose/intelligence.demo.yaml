# Demo config — used by `docker-compose.demo.yml` to point the service
# at the in-stack Prometheus the demo stack spins up. NOT a deployment
# template: pilots deploy via Helm or `docker run` against THEIR
# Prometheus. See the README.
#
# Covers both univariate (cpu alone) and multivariate (cpu + memory)
# tasks so `make e2e` exercises the full Phase 3 surface.

intelligence:
  telemetry:
    source: prometheus
    prometheus:
      endpoint: http://prometheus:9090
    # allow_endpoint_override: false   # opt-in per-request override (SSRF surface; off by default)

  tasks:
    # ---- Univariate ------------------------------------------------------
    cpu_forecast_arima:
      kind: arima
      steps_back: 1
      features:
        - name: cpu
          value_range: [0.0, 1.0]
          query: 'avg(rate(node_cpu_seconds_total{mode!="idle"}[30s]))'

    cpu_forecast_xgb:
      kind: xgb
      steps_back: 6
      features:
        - name: cpu
          value_range: [0.0, 1.0]
          query: 'avg(rate(node_cpu_seconds_total{mode!="idle"}[30s]))'

    cpu_forecast_lstm:
      kind: lstm
      steps_back: 6
      batch_size: 16
      model_params:
        hidden_size: 4
        num_epochs: 3
      features:
        - name: cpu
          value_range: [0.0, 1.0]
          query: 'avg(rate(node_cpu_seconds_total{mode!="idle"}[30s]))'

    cpu_forecast_arima_drift:
      kind: drift
      forecaster: cpu_forecast_arima
      chunk_size: 12
      features:
        - name: cpu
          value_range: [0.0, 1.0]
          query: 'avg(rate(node_cpu_seconds_total{mode!="idle"}[30s]))'

    # ---- Multivariate (Phase 3) -----------------------------------------
    # Target = cpu; memory is an exogenous covariate. Same PromQL strings
    # as the univariate tasks above so we don't add scrape pressure on
    # the demo node-exporter.
    cpu_mem_forecast_xgb:
      kind: xgb
      steps_back: 6
      features:
        - name: cpu
          value_range: [0.0, 1.0]
          query: 'avg(rate(node_cpu_seconds_total{mode!="idle"}[30s]))'
        - name: mem
          value_range: [0.0, 1.0]
          query: '1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)'

    cpu_mem_forecast_lstm:
      kind: lstm
      steps_back: 6
      batch_size: 16
      model_params:
        hidden_size: 8
        num_epochs: 3
      features:
        - name: cpu
          value_range: [0.0, 1.0]
          query: 'avg(rate(node_cpu_seconds_total{mode!="idle"}[30s]))'
        - name: mem
          value_range: [0.0, 1.0]
          query: '1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)'

    cpu_mem_drift:
      kind: drift
      forecaster: cpu_mem_forecast_xgb
      chunk_size: 12
      features:
        - name: cpu
          value_range: [0.0, 1.0]
          query: 'avg(rate(node_cpu_seconds_total{mode!="idle"}[30s]))'
        - name: mem
          value_range: [0.0, 1.0]
          query: '1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)'
