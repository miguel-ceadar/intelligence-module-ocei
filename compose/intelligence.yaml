# Default standalone config for the intelligence service.
#
# The service queries an external Prometheus you operate. Either edit
# `endpoint:` below, or leave it as-is and override at deploy time with
# the env var:
#
#   INTELLIGENCE_TELEMETRY__PROMETHEUS__ENDPOINT=https://prom.example.com
#
# Env vars win over the YAML (pydantic-settings, double-underscore
# delimits nested sections). Set them in your shell or in a `.env`
# alongside docker-compose.yml — see `.env.example` for the full set.
#
# The PromQL queries below assume the target Prometheus scrapes
# node-exporter; replace them with whatever metrics your deployment
# exposes for CPU utilisation. Each task maps to one query that has to
# return a single time series (one value per timestamp).

intelligence:
  enabled_tasks:
    - cpu_forecast_arima
    - cpu_forecast_xgb
    - cpu_forecast_lstm
    - cpu_forecast_arima_drift
  telemetry:
    source: prometheus
    prometheus:
      endpoint: http://prometheus.example.com:9090   # override via env or edit
      # token_env: PROM_TOKEN                       # uncomment for bearer auth
      # tls_skip_verify: false
      queries:
        cpu_forecast_arima: 'avg(rate(node_cpu_seconds_total{mode!="idle"}[30s]))'
        cpu_forecast_xgb: 'avg(rate(node_cpu_seconds_total{mode!="idle"}[30s]))'
        cpu_forecast_lstm: 'avg(rate(node_cpu_seconds_total{mode!="idle"}[30s]))'
        cpu_forecast_arima_drift: 'avg(rate(node_cpu_seconds_total{mode!="idle"}[30s]))'
