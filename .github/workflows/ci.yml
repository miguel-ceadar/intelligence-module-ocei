# Pull-request + push CI: lint and run the unit + integration suites
# against the committed lockfile so regressions land before tags do.
#
# Smoke tests are deselected by default (pyproject's pytest addopts)
# because they need a running compose stack — they live in `make e2e`
# instead. Tag pushes are intentionally skipped here; the release
# workflow handles those.

name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.11"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install (locked, with dev extra)
        run: uv sync --locked --extra dev

      - name: Lint (ruff check)
        run: uv run ruff check src tests

      - name: Lint (ruff format --check)
        run: uv run ruff format --check src tests

      - name: Test (unit + integration, smoke excluded by config)
        run: uv run pytest

      - name: Export resolved deps for audit
        # pip-audit needs a flat requirements.txt; uv.lock + pyproject
        # aren't directly consumable. `--no-emit-project` skips our own
        # package metadata; `--extra dev` mirrors the install above.
        run: uv export --no-emit-project --extra dev --output-file=/tmp/requirements-audit.txt

      - name: Audit Python deps for known CVEs (pip-audit)
        # Fails the job on any finding by default — bump or vendor-fix
        # a transitive dep rather than suppressing here. To skip a
        # specific CVE that has no upstream fix, add it to ignore-vulns.
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: /tmp/requirements-audit.txt
          # ignore-vulns: |
          #   GHSA-xxxx-yyyy-zzzz
