# Pull-request + push CI: lint and run the unit + integration suites
# against the committed lockfile so regressions land before tags do.
#
# Smoke tests are deselected by default (pyproject's pytest addopts)
# because they need a running compose stack — they live in `make e2e`
# instead. Tag pushes are intentionally skipped here; the release
# workflow handles those.

name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.11"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install (locked, with dev extra)
        run: uv sync --locked --extra dev

      - name: Lint (ruff check)
        run: uv run ruff check src tests

      - name: Lint (ruff format --check)
        run: uv run ruff format --check src tests

      - name: Test (unit + integration, smoke excluded by config)
        run: uv run pytest

      - name: Audit Python deps for known CVEs (pip-audit)
        # Runs against the venv that `uv sync` just populated.
        # `--skip-editable` skips our own package (not on PyPI). The
        # pypa/gh-action-pip-audit action installs into a throwaway
        # venv that doesn't see the PyTorch CPU index, so it can't
        # resolve our torch+cpu pin; running pip-audit directly
        # against the already-resolved env sidesteps that.
        #
        # Fails on any finding. To suppress a CVE with no upstream fix,
        # append `--ignore-vuln GHSA-xxxx-yyyy-zzzz` to the command
        # below (one flag per CVE).
        run: uv run --with pip-audit pip-audit --skip-editable

  # Chart lint + template-matrix render. Runs in parallel with the Python
  # suite. The release workflow already does this before publishing, but
  # by then it's too late — we want a broken conditional to fail the PR.
  # The values overlays live at helm/intelligence/ci/ and are mirrored by
  # `make chart-template-matrix` so local runs match CI exactly.
  helm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Lint chart
        run: helm lint helm/intelligence

      # Default values.yaml ships `tasks: {}` and the deployment template
      # refuses to render without at least one task (pre-flight guard).
      # The two CI overlays each declare a single task so the matrix
      # exercises the templates end-to-end.
      - name: Template chart (minimal — single task, all toggles off)
        run: helm template icos-intelligence-ocei helm/intelligence -f helm/intelligence/ci/minimal-values.yaml

      - name: Template chart (full — single task, all toggles on)
        run: helm template icos-intelligence-ocei helm/intelligence -f helm/intelligence/ci/full-values.yaml
