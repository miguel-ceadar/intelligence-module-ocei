# Demo stack — pulls the published image and spins up an in-stack
# Prometheus + node-exporter so you can see the API work in 3 minutes
# against synthetic data. NOT a deployment template: pilots deploy via
# the Helm chart (k8s) or `docker run` (single host) against their OWN
# Prometheus. See the README for those recipes.
#
# Filename is `.demo.yml` (not `docker-compose.yml`) by design — there
# is no standalone deployment compose, so we don't want `docker compose
# up` in the repo root to pretend there is one. Invoke explicitly:
#   docker compose -f docker-compose.demo.yml up -d --wait
# or `make e2e`.
#
# Pin the image tag via INTELLIGENCE_TAG (default: latest).
#
# Contributors rebuilding from local sources: layer in the dev overlay,
#   docker compose -f docker-compose.demo.yml -f docker-compose.dev.yml up -d --build --wait
# or `make e2e-dev`.

services:
  intelligence:
    image: ghcr.io/miguel-ceadar/icos-intelligence-ocei:${INTELLIGENCE_TAG:-latest}
    # "3000:3000" binds to 0.0.0.0:3000 — fine on a workstation, but if
    # you run the demo on a public host either firewall the port or
    # change to "127.0.0.1:3000:3000". /metrics, /docs, and probes are
    # unauthenticated by design.
    ports:
      - "3000:3000"
    environment:
      INTELLIGENCE_CONFIG: /etc/intelligence/config.yaml
    env_file:
      - path: .env
        required: false
    volumes:
      - ./compose/intelligence.demo.yaml:/etc/intelligence/config.yaml:ro
      - intelligence-bentoml:/var/lib/bentoml
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 2s
      timeout: 2s
      retries: 60
      start_period: 5s

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=12h
      - --web.listen-address=:9090
    ports:
      - "9090:9090"
    volumes:
      - ./compose/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - node-exporter
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 2s
      timeout: 1s
      retries: 30

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - --web.listen-address=:9100
    expose:
      - "9100"

volumes:
  intelligence-bentoml:
