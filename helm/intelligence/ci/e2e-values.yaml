# Used by `make chart-e2e`. Mirrors compose/intelligence.demo.yaml so
# the same smoke suite that drives `make e2e` against the compose stack
# drives `make chart-e2e` against a kind-installed chart. Points the
# telemetry endpoint at the Prometheus deployed alongside (see
# helm/intelligence/ci/prom-stack.yaml). 7 tasks → matches the smoke
# suite's `body["tasks"] >= 7` assertion.
#
# Not part of the CI helm-template matrix (that's minimal/full); only
# referenced from the chart-e2e Makefile target.

# Override readiness to /healthz so `helm --wait` completes quickly:
# /readyz returns 503 until each task has a model, and smoke trains
# them explicitly (mirrors `make e2e`, which also doesn't bootstrap).
readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

config:
  intelligence:
    telemetry:
      source: prometheus
      prometheus:
        endpoint: http://prometheus.default.svc:9090
    tasks:
      cpu_forecast_arima:
        kind: arima
        steps_back: 1
        features:
          - name: cpu
            value_range: [0.0, 1.0]
            query: 'avg(rate(node_cpu_seconds_total{mode!="idle"}[30s]))'

      cpu_forecast_xgb:
        kind: xgb
        steps_back: 6
        features:
          - name: cpu
            value_range: [0.0, 1.0]
            query: 'avg(rate(node_cpu_seconds_total{mode!="idle"}[30s]))'

      cpu_forecast_lstm:
        kind: lstm
        steps_back: 6
        batch_size: 16
        model_params:
          hidden_size: 4
          num_epochs: 3
        features:
          - name: cpu
            value_range: [0.0, 1.0]
            query: 'avg(rate(node_cpu_seconds_total{mode!="idle"}[30s]))'

      cpu_forecast_arima_drift:
        kind: drift
        forecaster: cpu_forecast_arima
        chunk_size: 12
        features:
          - name: cpu
            value_range: [0.0, 1.0]
            query: 'avg(rate(node_cpu_seconds_total{mode!="idle"}[30s]))'

      cpu_mem_forecast_xgb:
        kind: xgb
        steps_back: 6
        features:
          - name: cpu
            value_range: [0.0, 1.0]
            query: 'avg(rate(node_cpu_seconds_total{mode!="idle"}[30s]))'
          - name: mem
            value_range: [0.0, 1.0]
            query: '1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)'

      cpu_mem_forecast_lstm:
        kind: lstm
        steps_back: 6
        batch_size: 16
        model_params:
          hidden_size: 8
          num_epochs: 3
        features:
          - name: cpu
            value_range: [0.0, 1.0]
            query: 'avg(rate(node_cpu_seconds_total{mode!="idle"}[30s]))'
          - name: mem
            value_range: [0.0, 1.0]
            query: '1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)'

      cpu_mem_drift:
        kind: drift
        forecaster: cpu_mem_forecast_xgb
        chunk_size: 12
        features:
          - name: cpu
            value_range: [0.0, 1.0]
            query: 'avg(rate(node_cpu_seconds_total{mode!="idle"}[30s]))'
          - name: mem
            value_range: [0.0, 1.0]
            query: '1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)'
