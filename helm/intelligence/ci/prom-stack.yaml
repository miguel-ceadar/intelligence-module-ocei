# Prometheus + node-exporter for `make chart-e2e`. k8s port of the
# compose stack (docker-compose.demo.yml + compose/prometheus.yml) so
# the smoke suite trains against real PromQL inside a kind cluster.
#
# Single-replica Deployments — node-exporter reads its own container's
# /proc, which is enough to populate node_cpu_seconds_total and
# node_memory_* with non-trivial values. 2s scrape interval mirrors
# compose so the smoke suite's 60-samples wait clears in ~2 min.
#
# Applied + torn down from the Makefile (chart-e2e-up / chart-e2e-down).
# Not a Helm artifact despite living under helm/intelligence/ci/ — it
# sits next to e2e-values.yaml because both exist only to support that
# one Makefile target.

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 2s
      evaluation_interval: 15s
      scrape_timeout: 1s
    scrape_configs:
      - job_name: node
        static_configs:
          - targets: ["node-exporter:9100"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=12h
            - --web.listen-address=:9090
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            periodSeconds: 2
            failureThreshold: 30
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: http
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-exporter
  labels:
    app: node-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
    spec:
      containers:
        - name: node-exporter
          image: prom/node-exporter:v1.8.2
          args:
            - --web.listen-address=:9100
          ports:
            - containerPort: 9100
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: node-exporter
spec:
  selector:
    app: node-exporter
  ports:
    - port: 9100
      targetPort: http
      name: http
