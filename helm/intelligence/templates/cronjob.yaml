{{- if .Values.retraining.enabled -}}
{{- $authTokenEnv := "" -}}
{{- with .Values.config }}{{- with .intelligence }}{{- with .auth }}{{- $authTokenEnv = .token_env | default "" -}}{{- end }}{{- end }}{{- end }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "intelligence.fullname" . }}-retrain
  labels:
    {{- include "intelligence.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.retraining.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: retrain
              image: curlimages/curl:8.6.0
              {{- if $authTokenEnv }}
              env:
                - name: {{ $authTokenEnv }}
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "intelligence.secretName" . }}
                      key: {{ $authTokenEnv }}
              {{- end }}
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  {{- range .Values.retraining.tasks }}
                  echo "Retraining {{ . }}..."
                  curl -fsS -X POST \
                    -H 'Content-Type: application/json' \
                    {{- if $authTokenEnv }}
                    -H "Authorization: Bearer ${{ $authTokenEnv }}" \
                    {{- end }}
                    -d '{"data_source": {{ $.Values.retraining.dataSource | toJson }}}' \
                    http://{{ include "intelligence.fullname" $ }}:{{ $.Values.service.port }}/tasks/{{ . }}/train
                  {{- end }}
{{- end -}}
