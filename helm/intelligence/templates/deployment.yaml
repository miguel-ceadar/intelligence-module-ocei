{{- /*
Pre-flight guards. We refuse to render configurations that are silently
broken at runtime — better a clear `helm install` error than a
CrashLoopBackOff or a silently-ignored field.
*/ -}}
{{- if and (gt (int .Values.replicaCount) 1) .Values.persistence.enabled (eq .Values.persistence.accessMode "ReadWriteOnce") -}}
{{- fail (printf "replicaCount=%d with persistence.accessMode=ReadWriteOnce: only one pod can mount the PVC at a time; the others stay Pending with MultiAttachError. Set persistence.accessMode to ReadWriteMany (and pick a storageClassName that supports it), or set replicaCount=1." (int .Values.replicaCount)) -}}
{{- end -}}
{{- if and .Values.existingSecretName .Values.secretEnv -}}
{{- fail "existingSecretName and secretEnv are both set: secretEnv would be silently ignored. Pick one — either reference an existing Secret (existingSecretName) or let the chart create one from secretEnv." -}}
{{- end -}}
{{- if not .Values.config.intelligence.tasks -}}
{{- fail "config.intelligence.tasks is empty: the pod starts but /readyz stays 503 forever (the registry needs at least one task to serve). Declare at least one task under config.intelligence.tasks — see helm/intelligence/README.md and examples/*/config.yaml." -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "intelligence.fullname" . }}
  labels:
    {{- include "intelligence.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "intelligence.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "intelligence.selectorLabels" . | nindent 8 }}
      annotations:
        # Force a rolling restart when either the rendered config or the
        # secret values change — pods otherwise keep stale data.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if or .Values.existingSecretName .Values.secretEnv }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: intelligence
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: INTELLIGENCE_CONFIG
              value: /etc/intelligence/config.yaml
            {{- range $k, $v := .Values.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- if not .Values.existingSecretName }}
            {{- range $k, $_ := .Values.secretEnv }}
            - name: {{ $k }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "intelligence.secretName" $ }}
                  key: {{ $k }}
            {{- end }}
            {{- end }}
          {{- if .Values.existingSecretName }}
          envFrom:
            # Every key in the referenced Secret becomes an env var with
            # the same name. Use this with external-secrets / SealedSecrets
            # so tokens never appear in values.yaml.
            - secretRef:
                name: {{ .Values.existingSecretName }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/intelligence
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: bentoml-store
              mountPath: /var/lib/bentoml
            {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "intelligence.fullname" . }}-config
        {{- if .Values.persistence.enabled }}
        - name: bentoml-store
          persistentVolumeClaim:
            claimName: {{ include "intelligence.fullname" . }}-bentoml
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
