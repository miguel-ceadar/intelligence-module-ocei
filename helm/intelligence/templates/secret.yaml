{{- if and (not .Values.existingSecretName) .Values.secretEnv -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "intelligence.fullname" . }}-secrets
  labels:
    {{- include "intelligence.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secretEnv }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end -}}
