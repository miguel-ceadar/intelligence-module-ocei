apiVersion: v2
name: icos-intelligence-ocei
description: |
  Train and serve forecasting + drift-detection models against your existing
  Prometheus metrics. A small HTTP API that plugs into the monitoring you
  already run — no glue code, no separate training infra.
  CeADAR Ireland's O-CEI iteration of the ICOS intelligence module.
type: application
# version + appVersion are rewritten from the git tag at release time
# (see .github/workflows/release.yml). The in-repo values are kept in
# sync with pyproject.toml so `helm template helm/intelligence` locally
# matches the most recent release.
version: 0.2.10
appVersion: "0.2.10"
keywords:
  - forecasting
  - drift-detection
  - prometheus
  - mlops
  - machine-learning
  - icos
  - ocei
sources:
  - https://github.com/miguel-ceadar/intelligence-module-ocei
  - https://github.com/icos-project/intelligence-module
maintainers:
  - name: CeADAR Ireland
