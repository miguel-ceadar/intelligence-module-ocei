# CPU forecasting — four tasks against Prometheus endpoint.
# Override the endpoint via INTELLIGENCE_TELEMETRY__PROMETHEUS__ENDPOINT
# at deploy time, or edit it inline.

intelligence:
  telemetry:
    source: prometheus
    prometheus:
      endpoint: http://prometheus.example.com:9090
      # token_env: PROM_TOKEN
      # tls_skip_verify: false

  tasks:
    cpu_forecast_arima:
      kind: arima
      steps_back: 1
      features:
        - name: cpu
          value_range: [0.0, 1.0]
          query: 'avg(rate(node_cpu_seconds_total{mode!="idle"}[30s]))'

    cpu_forecast_xgb:
      kind: xgb
      steps_back: 6
      features:
        - name: cpu
          value_range: [0.0, 1.0]
          query: 'avg(rate(node_cpu_seconds_total{mode!="idle"}[30s]))'

    cpu_forecast_lstm:
      kind: lstm
      steps_back: 6
      batch_size: 16
      model_params:
        hidden_size: 4
        num_epochs: 3
      features:
        - name: cpu
          value_range: [0.0, 1.0]
          query: 'avg(rate(node_cpu_seconds_total{mode!="idle"}[30s]))'

    cpu_forecast_arima_drift:
      kind: drift
      forecaster: cpu_forecast_arima
      chunk_size: 12
      features:
        - name: cpu
          value_range: [0.0, 1.0]
          query: 'avg(rate(node_cpu_seconds_total{mode!="idle"}[30s]))'
