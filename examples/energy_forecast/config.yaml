# Energy forecasting — four tasks against an energy metric.
# Defaults to Kepler (eBPF) PromQL. See README.md for alternatives
# (IPMI exporter, RAPL via node-exporter, PDU via snmp_exporter,
# smart-plug exporters, Redfish). Override the endpoint via
# INTELLIGENCE_TELEMETRY__PROMETHEUS__ENDPOINT at deploy time, or
# edit it inline.

intelligence:
  telemetry:
    source: prometheus
    prometheus:
      endpoint: http://prometheus.example.com:9090

  tasks:
    energy_forecast_arima:
      kind: arima
      steps_back: 1
      features:
        - name: energy
          value_range: [0.0, 500.0]   # watts; widen if your nodes draw more
          query: 'sum(rate(kepler_node_package_joules_total[30s]))'

    energy_forecast_xgb:
      kind: xgb
      steps_back: 6
      features:
        - name: energy
          value_range: [0.0, 500.0]
          query: 'sum(rate(kepler_node_package_joules_total[30s]))'

    energy_forecast_lstm:
      kind: lstm
      steps_back: 6
      batch_size: 16
      model_params:
        hidden_size: 4
        num_epochs: 3
      features:
        - name: energy
          value_range: [0.0, 500.0]
          query: 'sum(rate(kepler_node_package_joules_total[30s]))'

    energy_forecast_arima_drift:
      kind: drift
      forecaster: energy_forecast_arima
      chunk_size: 12
      features:
        - name: energy
          value_range: [0.0, 500.0]
          query: 'sum(rate(kepler_node_package_joules_total[30s]))'
