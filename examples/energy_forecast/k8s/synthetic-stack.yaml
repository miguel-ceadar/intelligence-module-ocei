# Self-contained Prometheus + synthetic energy exporter for the
# energy walkthrough (docs/energy-walkthrough.md). Spins up an
# `energy-forecast` namespace, a tiny python-based exporter that emits a
# sinusoidal `synthetic_energy_watts` gauge, and a Prometheus that
# scrapes it every 5s.
#
# Use this only when you don't already have a Prometheus scraping a
# real energy exporter (Kepler / RAPL / IPMI / PDU / smart-plug — see
# examples/energy_forecast/README.md for the PromQL recipes). It's
# test scaffolding, not a deployment template.

apiVersion: v1
kind: Namespace
metadata:
  name: energy-forecast
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: synthetic-exporter-script
  namespace: energy-forecast
data:
  exporter.py: |
    import http.server, math, time, random, os
    BASE   = float(os.environ.get("BASE_WATTS",  "150"))
    AMP    = float(os.environ.get("AMP_WATTS",   "50"))
    PERIOD = float(os.environ.get("PERIOD_SEC",  "600"))
    NOISE  = float(os.environ.get("NOISE_STD",   "5"))

    class H(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path != "/metrics":
                self.send_response(404); self.end_headers(); return
            t = time.time()
            v = max(0.0, BASE + AMP * math.sin(2 * math.pi * t / PERIOD) + random.gauss(0, NOISE))
            body = (
                "# HELP synthetic_energy_watts Synthetic node power draw\n"
                "# TYPE synthetic_energy_watts gauge\n"
                f"synthetic_energy_watts {v:.3f}\n"
            ).encode()
            self.send_response(200)
            self.send_header("Content-Type", "text/plain; version=0.0.4")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def log_message(self, *a, **k):
            return

    http.server.ThreadingHTTPServer(("", 8000), H).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synthetic-energy-exporter
  namespace: energy-forecast
spec:
  replicas: 1
  selector:
    matchLabels:
      app: synthetic-energy-exporter
  template:
    metadata:
      labels:
        app: synthetic-energy-exporter
    spec:
      containers:
        - name: exporter
          image: python:3.12-slim
          command: ["python", "/scripts/exporter.py"]
          ports:
            - name: metrics
              containerPort: 8000
          env:
            - name: BASE_WATTS
              value: "150"
            - name: AMP_WATTS
              value: "50"
            - name: PERIOD_SEC
              value: "600"
            - name: NOISE_STD
              value: "5"
          volumeMounts:
            - name: script
              mountPath: /scripts
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 2
            periodSeconds: 5
      volumes:
        - name: script
          configMap:
            name: synthetic-exporter-script
---
apiVersion: v1
kind: Service
metadata:
  name: synthetic-energy-exporter
  namespace: energy-forecast
spec:
  selector:
    app: synthetic-energy-exporter
  ports:
    - name: metrics
      port: 8000
      targetPort: metrics
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: energy-forecast
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 30s
    scrape_configs:
      - job_name: synthetic-energy
        static_configs:
          - targets: ["synthetic-energy-exporter:8000"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: energy-forecast
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=2h
            - --web.listen-address=:9090
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: energy-forecast
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
