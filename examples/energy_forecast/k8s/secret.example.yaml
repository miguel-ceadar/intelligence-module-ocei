# Template for the bearer-token Secret referenced from values-walkthrough.yaml's
# `existingSecretName: intelligence-secrets`. Don't apply this file as-is —
# replace the placeholders with values you actually generate, or use
# `kubectl create secret generic intelligence-secrets --from-literal=...`
# (shown in docs/energy-walkthrough.md Step 1).
#
# Production: produce this via sealed-secrets, external-secrets, or
# Vault so the cleartext never touches a values file or your shell
# history.

apiVersion: v1
kind: Secret
metadata:
  name: intelligence-secrets
  namespace: energy-forecast
type: Opaque
stringData:
  # Bearer token clients must send on /train, /predict, /tasks.
  # Generate with `openssl rand -hex 32`.
  API_TOKEN: REPLACE_ME

  # Sent as `Authorization: Bearer <token>` to Prometheus. The
  # synthetic Prometheus in synthetic-stack.yaml does not enforce
  # auth — this is here to mirror the production wiring.
  PROM_TOKEN: REPLACE_ME
