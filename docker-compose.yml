# Standalone deployment. The service points at an external Prometheus
# you operate — set its endpoint in `compose/intelligence.yaml` or
# override via `.env` (see `.env.example`).
#
# For a local trial without your own Prometheus, layer in the demo
# overlay:
#
#   docker compose -f docker-compose.yml -f docker-compose.demo.yml up -d
#
# (or `make up-demo` / `make e2e`).

services:
  intelligence:
    build:
      context: .
      dockerfile: Dockerfile
    image: intelligence-utility:dev
    ports:
      - "3000:3000"
    environment:
      INTELLIGENCE_CONFIG: /etc/intelligence/config.yaml
    env_file:
      - path: .env
        required: false
    volumes:
      - ${INTELLIGENCE_CONFIG_FILE:-./compose/intelligence.yaml}:/etc/intelligence/config.yaml:ro
      - intelligence-bentoml:/var/lib/bentoml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 2s
      timeout: 2s
      retries: 60
      start_period: 5s

volumes:
  intelligence-bentoml:
